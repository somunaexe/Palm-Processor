version: "3.8"

services:
  simulator:
    build:
      context: ./simulator
    container_name: sensor-simulator
    env_file:
      - .env
    # restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: fastapi-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    # restart: unless-stopped

  streamlit:
    build:
      context: ./streamlit
    container_name: palm-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend
    # restart: unless-stopped