apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: palm-pro

spec:
  replicas: 1

  selector:
    matchLabels:
      app: fastapi

  template:
    metadata:
      labels:
        app: fastapi

    spec:
      containers:
        - name: fastapi

          image: palm-fastapi:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: fastapi
  namespace: palm-pro

spec:
  selector:
    app: fastapi

  ports:
    - port: 8000
      targetPort: 8000

  type: ClusterIP